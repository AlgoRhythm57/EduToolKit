<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Timer</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .timer-container {
      max-width: 400px;
      margin: 40px auto;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
    }

    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .mode-button {
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(30, 41, 59, 0.6);
      transition: 0.3s;
    }

    .mode-button.active {
      background: #3b82f6;
      color: white;
    }

    .timer-display {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 20px auto;
    }

    .timer-circle {
      transform: rotate(-90deg);
    }

    .timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-weight: bold;
    }

    .controls button {
      margin: 5px;
    }

    .session-counter {
      margin-top: 15px;
      font-size: 16px;
      color: #cbd5f5;
    }

    .quote {
      margin-top: 20px;
      font-size: 14px;
      font-style: italic;
      color: #94a3b8;
    }

    .custom-inputs {
      margin: 15px 0;
    }

    .custom-inputs input {
      width: 80px;
      padding: 6px;
    }
  </style>
</head>

<body>

  <h1>Study Timer</h1>

  <div class="timer-container">

    <div class="mode-buttons">
      <div class="mode-button active" data-mode="pomodoro">Pomodoro</div>
      <div class="mode-button" data-mode="deep">Deep Focus</div>
      <div class="mode-button" data-mode="custom">Custom</div>
    </div>

    <div class="custom-inputs" style="display:none;">
      Work: <input type="number" id="customWork" value="25"> min
      Break: <input type="number" id="customBreak" value="5"> min
    </div>

    <div class="timer-display">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="90" stroke="#2563eb" stroke-width="12" fill="none"
          stroke-dasharray="565.48" stroke-dashoffset="0" class="timer-circle"></circle>
      </svg>
      <div class="timer-text" id="timerText">25:00</div>
    </div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
      <button id="skipBtn">Skip</button>
    </div>

    <div class="session-counter" id="sessionCounter">Session 1 of 4</div>
    <div class="quote" id="quote">"Focus is the key to success."</div>
    <div class="total-time">Today's Study Time: <span id="totalTime">0</span> min</div>

  </div>

  <script>
    const modeButtons = document.querySelectorAll('.mode-button');
    const customInputs = document.querySelector('.custom-inputs');
    const timerText = document.getElementById('timerText');
    const circle = document.querySelector('.timer-circle');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const skipBtn = document.getElementById('skipBtn');
    const sessionCounter = document.getElementById('sessionCounter');
    const quote = document.getElementById('quote');
    const totalTimeEl = document.getElementById('totalTime');

    let workTime = 25 * 60;
    let breakTime = 5 * 60;
    let mode = 'pomodoro';
    let secondsLeft = workTime;
    let timerInterval = null;
    let onBreak = false;
    let session = 1;
    const totalSessions = 4;
    let totalStudy = parseInt(localStorage.getItem('totalStudy')) || 0;

    totalTimeEl.innerText = totalStudy;

    const quotes = [
      "Focus is the key to success.",
      "Every minute counts!",
      "Stay consistent, stay focused.",
      "Small steps lead to big results.",
      "Discipline is freedom."
    ];

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        modeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        onBreak = false;
        session = 1;
        sessionCounter.innerText = `Session ${session} of ${totalSessions}`;
        resetTimer();
        if (mode === 'custom') {
          customInputs.style.display = 'block';
        } else {
          customInputs.style.display = 'none';
        }
      });
    });

    function resetTimer() {
      if (mode === 'pomodoro') {
        workTime = 25 * 60;
        breakTime = 5 * 60;
      } else if (mode === 'deep') {
        workTime = 50 * 60;
        breakTime = 10 * 60;
      } else if (mode === 'custom') {
        workTime = parseInt(document.getElementById('customWork').value) * 60;
        breakTime = parseInt(document.getElementById('customBreak').value) * 60;
      }
      secondsLeft = workTime;
      updateTimerDisplay();
    }

    function updateTimerDisplay() {
      const min = Math.floor(secondsLeft / 60);
      const sec = secondsLeft % 60;
      timerText.innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;

      const circumference = 2 * Math.PI * 90;
      let offset = circumference * (1 - secondsLeft / (onBreak ? breakTime : workTime));
      circle.style.strokeDashoffset = offset;
    }

    function playChime() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.value = 880;
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + 0.3);
    }

    function startTimer() {
      if (timerInterval) return;
      timerInterval = setInterval(() => {
        secondsLeft--;
        updateTimerDisplay();
        if (secondsLeft <= 0) {
          playChime();
          if (!onBreak) {
            totalStudy += workTime / 60;
            localStorage.setItem('totalStudy', totalStudy);
            totalTimeEl.innerText = totalStudy;
          }
          onBreak = !onBreak;
          secondsLeft = onBreak ? breakTime : workTime;
          if (!onBreak) {
            session++;
            if (session > totalSessions) session = 1;
            sessionCounter.innerText = `Session ${session} of ${totalSessions}`;
            quote.innerText = quotes[Math.floor(Math.random() * quotes.length)];
          }
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function skipTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      onBreak = !onBreak;
      secondsLeft = onBreak ? breakTime : workTime;
      updateTimerDisplay();
    }

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);
    skipBtn.addEventListener('click', skipTimer);

    resetTimer();
  </script>
<!-- Footer -->

</footer>
</body>

</html>
